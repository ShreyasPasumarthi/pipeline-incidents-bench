# Export config for the product tracking pipeline (owned by the growth team).
# Changes here are deployed by the growth team's exporter, not this repo's CI.
# v2: identifiers standardized across all exports per tracking-schema-v2 RFC.
export: signups
schedule: daily 04:00 UTC
fields:
  - customer_id
  - signup_date
  - plan
  - channel
destination: data/raw/signups.csv
